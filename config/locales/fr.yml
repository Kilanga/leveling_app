  pages:
    terms:
      page_title: Conditions d'utilisation
      page_description: Lisez nos conditions d'utilisation pour MotivUp.
      section_use: Utilisation de l'application
      content_use: MotivUp est une application de progression gamifiée. Vous acceptez d'utiliser ce service conformément aux lois applicables et à ces conditions. Vous ne pouvez pas utiliser l'application pour activités frauduleuses, diffamatoires ou illégales.
      section_accounts: Comptes utilisateur
      content_accounts: Vous êtes responsable de la confidentialité de vos identifiants. MotivUp n'est pas responsable des accès non autorisés si vous partagez vos credentials. Vous acceptez de fournir des informations exactes lors de l'enregistrement.
      section_intellectual: Propriété intellectuelle
      content_intellectual: Tout contenu fourni par MotivUp (design, mécanique, textes) est protégé par copyright. Vous pouvez utiliser le service pour votre usage personnel, mais vous ne pouvez pas reproduire ou revendre le contenu sans permission.
      section_limitation: Limitation de responsabilité
      content_limitation: MotivUp est fourni 'tel quel'. Nous ne garantissons pas que le service sera ininterrompu ou exempt d'erreurs. MotivUp ne sera pas responsable pour pertes de données, interruptions, ou dommages indirects.
      section_changes: Modifications des conditions
      content_changes: MotivUp se réserve le droit de modifier ces conditions à tout moment. Les modifications entrent en vigueur immédiatement. Votre utilisation continue implique acceptation des modifications.
      section_contact: Contact
      content_contact: Pour toute question sur ces conditions, contactez-nous via le formulaire de support dans l'application.
    privacy:
      page_title: Politique de confidentialité
      page_description: Lisez notre politique de confidentialité pour MotivUp.
      section_collection: Collecte de données
      content_collection: MotivUp collecte les informations que vous soumettez (email, pseudo, avatar). Nous collectons également des données d'usage anonymes pour améliorer le service (événements de progression, temps de session).
      section_use: Utilisation des données
      content_use: Vos données personnelles sont utilisées pour authentifier votre compte, envoyer confirmations et newsletters, améliorer le service et détecter les abus. Nous ne vendons jamais vos données à des tiers.
      section_sharing: Partage de données
      content_sharing: Vos données publiques (pseudo, avatar, classement) sont visibles par les autres joueurs. Nous ne partageons jamais avec tiers-partis sans votre consentement, sauf si légalement requis.
      section_security: Sécurité
      content_security: Vos données sont hébergées sur Heroku/Supabase avec chiffrage. Hors de votre responsabilité, nous mettons en œuvre les meilleures pratiques de sécurité. Vous êtes responsable de la sécurité de vos identifiants.
      section_rights: Vos droits
      content_rights: Vous pouvez demander l'accès, la rectification ou la suppression de vos données personnelles via le support. Les demandes de suppression de compte sont traitées sous 30 jours.
      section_changes: Modifications de la politique
      content_changes: MotivUp peut modifier cette politique à tout moment. Les modifications entrent en vigueur immédiatement. Votre utilisation continue implique acceptation.
      section_contact: Contact
      content_contact: Pour toute question sur vos données ou cette politique, contactez-nous via le formulaire de support.
    guilde_et_cie_privacy:
      page_title: Politique de confidentialité — Guilde & Cie
      page_description: Politique de confidentialité du jeu Guilde & Cie.
      section_offline: Le jeu fonctionne sans compte
      content_offline: Guilde & Cie est jouable entièrement hors ligne, sans créer de compte. Toute votre progression est alors stockée uniquement sur votre appareil, et n'est jamais transmise à qui que ce soit.
      section_collection: Données collectées si vous créez un compte (fonctionnalités multijoueur)
      content_collection: 'La création d''un compte est optionnelle et sert uniquement à débloquer les fonctionnalités multijoueur (classement de guildes, alliances). Avec Google, nous recevons votre adresse e-mail et votre identifiant Google via le mécanisme officiel Google Sign-In, jamais votre mot de passe. Avec un lien magique par e-mail, nous recevons l''adresse e-mail saisie. Nous recevons aussi le nom de guilde que vous réservez, votre niveau de guilde, l''or total gagné et un score de puissance, utilisés uniquement pour le classement public et les alliances. Aucune autre donnée n''est collectée : pas de géolocalisation, pas de contacts, pas de suivi publicitaire.'
      section_hosting: Où sont stockées ces données
      content_hosting: Les données de compte et de jeu multijoueur sont hébergées par Supabase, notre prestataire technique, qui agit en tant que sous-traitant. Aucune donnée n'est vendue ni partagée avec des tiers à des fins publicitaires.
      section_retention: Durée de conservation
      content_retention: Vos données sont conservées tant que votre compte existe. Vous pouvez en demander la suppression à tout moment.
      section_deletion: Supprimer votre compte et vos données
      content_deletion: Vous pouvez demander la suppression complète de votre compte et des données associées à tout moment, depuis l'application (onglet Multi) ou via notre
      deletion_link_text: page de suppression de compte
      section_rights: Vos droits
      content_rights: Conformément au RGPD, vous disposez d'un droit d'accès, de rectification, d'effacement et de portabilité de vos données. Pour exercer ces droits, contactez-nous.
      section_changes: Modifications de cette politique
      content_changes: Cette politique peut être mise à jour. En cas de changement significatif, un message sera affiché dans l'application.
      section_contact: Contact
      content_contact: 'Pour toute question : arnaud.lothe@gmail.com'
    guilde_et_cie_account_deletion:
      page_title: Supprimer mon compte — Guilde & Cie
      page_description: Demander la suppression de votre compte et de vos données Guilde & Cie.
      intro: Cette page vous permet de demander la suppression de votre compte Guilde & Cie ainsi que de toutes les données associées (adresse e-mail, nom de guilde réservé, statistiques de classement, appartenance à une alliance).
      request_instructions: Pour demander la suppression, envoyez-nous un e-mail en indiquant l'adresse utilisée pour vous connecter au jeu (Google ou lien magique).
      request_button: Envoyer une demande de suppression
      mail_subject: Suppression de compte - Guilde & Cie
      mail_body: 'Bonjour, je souhaite supprimer mon compte Guilde & Cie associé à l''adresse e-mail suivante : '
      section_scope: Ce qui sera supprimé
      content_scope: Votre adresse e-mail, votre nom de guilde réservé, vos statistiques de classement (niveau, or gagné, puissance), et votre appartenance à une éventuelle alliance.
      section_not_affected: Ce qui n'est pas concerné
      content_not_affected: Votre progression de jeu solo, stockée uniquement sur votre appareil, n'est jamais envoyée à nos serveurs et n'est donc pas affectée par cette suppression.
      section_delay: Délai de traitement
      content_delay: Votre compte et vos données seront supprimés sous 30 jours maximum suivant votre demande. Vous recevrez une confirmation par e-mail une fois la suppression effectuée.
      privacy_link_text: Voir aussi notre politique de confidentialité complète
