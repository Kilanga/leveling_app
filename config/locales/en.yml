  pages:
    terms:
      page_title: Terms of Service
      page_description: Read our terms of service for MotivUp.
      section_use: App Usage
      content_use: MotivUp is a gamified progression application. You agree to use this service in accordance with applicable laws and these terms. You may not use the app for fraudulent, defamatory, or illegal activities.
      section_accounts: User Accounts
      content_accounts: You are responsible for the confidentiality of your credentials. MotivUp is not responsible for unauthorized access if you share your login information. You agree to provide accurate information upon registration.
      section_intellectual: Intellectual Property
      content_intellectual: All content provided by MotivUp (design, mechanics, text) is protected by copyright. You may use the service for personal use, but you cannot reproduce or resell content without permission.
      section_limitation: Limitation of Liability
      content_limitation: MotivUp is provided 'as is'. We do not guarantee that the service will be uninterrupted or error-free. MotivUp is not responsible for data loss, interruptions, or indirect damages.
      section_changes: Changes to Terms
      content_changes: MotivUp reserves the right to modify these terms at any time. Changes take effect immediately. Your continued use implies acceptance of modifications.
      section_contact: Contact
      content_contact: For any questions about these terms, contact us via the support form in the app.
    privacy:
      page_title: Privacy Policy
      page_description: Read our privacy policy for MotivUp.
      section_collection: Data Collection
      content_collection: MotivUp collects information you submit (email, username, avatar). We also collect anonymous usage data to improve the service (progression events, session time).
      section_use: Data Usage
      content_use: Your personal data is used to authenticate your account, send confirmations and newsletters, improve the service, and detect abuse. We never sell your data to third parties.
      section_sharing: Data Sharing
      content_sharing: Your public data (username, avatar, rank) is visible to other players. We never share with third parties without consent, except if legally required.
      section_security: Security
      content_security: Your data is hosted on Heroku/Supabase with encryption. Beyond your responsibility, we implement security best practices. You are responsible for credential security.
      section_rights: Your Rights
      content_rights: You can request access, correction, or deletion of your personal data via support. Account deletion requests are processed within 30 days.
      section_changes: Policy Changes
      content_changes: MotivUp may modify this policy at any time. Changes take effect immediately. Your continued use implies acceptance.
      section_contact: Contact
      content_contact: For any questions about your data or this policy, contact us via the support form.
    guilde_et_cie_privacy:
      page_title: Privacy Policy — Guilde & Cie
      page_description: Privacy policy for the Guilde & Cie game.
      section_offline: The game works without an account
      content_offline: Guilde & Cie can be played entirely offline, with no account required. Your progress is then stored only on your device, and is never sent anywhere.
      section_collection: Data collected if you create an account (multiplayer features)
      content_collection: 'Creating an account is optional and only unlocks multiplayer features (guild leaderboard, alliances). With Google, we receive your email address and Google ID via the official Google Sign-In mechanism, never your password. With a magic link by email, we receive the email address you enter. We also receive the guild name you reserve, your guild level, total gold earned, and a computed power score, used only for the public leaderboard and alliances. No other data is collected: no location, no contacts, no ad tracking.'
      section_hosting: Where this data is stored
      content_hosting: Account and multiplayer game data is hosted by Supabase, our technical provider, acting as a data processor. No data is sold or shared with third parties for advertising purposes.
      section_retention: Retention period
      content_retention: Your data is kept for as long as your account exists. You can request its deletion at any time.
      section_deletion: Deleting your account and data
      content_deletion: You can request full deletion of your account and associated data at any time, from within the app (Multiplayer tab) or via our
      deletion_link_text: account deletion page
      section_rights: Your rights
      content_rights: Under GDPR, you have the right to access, correct, erase, and port your data. To exercise these rights, contact us.
      section_changes: Changes to this policy
      content_changes: This policy may be updated over time. A significant change will be announced in the app.
      section_contact: Contact
      content_contact: 'For any question: arnaud.lothe@gmail.com'
    guilde_et_cie_account_deletion:
      page_title: Delete my account — Guilde & Cie
      page_description: Request deletion of your Guilde & Cie account and data.
      intro: This page lets you request deletion of your Guilde & Cie account and all associated data (email address, reserved guild name, leaderboard stats, alliance membership).
      request_instructions: To request deletion, send us an email stating the address you use to sign in to the game (Google or magic link).
      request_button: Send a deletion request
      mail_subject: Account deletion - Guilde & Cie
      mail_body: 'Hello, I would like to delete my Guilde & Cie account associated with the following email address: '
      section_scope: What will be deleted
      content_scope: Your email address, your reserved guild name, your leaderboard stats (level, gold earned, power), and your membership in any alliance.
      section_not_affected: What is not affected
      content_not_affected: Your solo game progress, stored only on your device, is never sent to our servers and is therefore unaffected by this deletion.
      section_delay: Processing time
      content_delay: Your account and data will be deleted within 30 days of your request at the latest. You will receive an email confirmation once deletion is complete.
      privacy_link_text: See also our full privacy policy
